<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
<title>Puzzle</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}
body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1e2a3a;
    font-family: sans-serif;
    color: #222;
}
.pa-card {
    background: #fff;
    border-radius: .75rem;
    padding: 2rem;
    width: 18rem;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 .5rem 1.5rem rgba(0, 0, 0, .4);
}
.pa-title {
    font-size: 1.1rem;
    color: #555;
    margin-bottom: 1rem;
}
.pa-sum {
    font-size: 2rem;
    font-weight: bold;
    margin-bottom: 1.25rem;
}
.pa-answer {
    font-size: 1.5rem;
    width: 6rem;
    text-align: center;
    padding: .4rem;
    border: .1rem solid #ccc;
    border-radius: .4rem;
}
.pa-button {
    display: block;
    width: 100%;
    margin-top: 1.25rem;
    padding: .75rem;
    font-size: 1.1rem;
    color: #fff;
    background: #3367d6;
    border: 0;
    border-radius: .4rem;
}
.pa-speak {
    margin-top: .75rem;
    color: #3367d6;
    background: #eef2fb;
}
.pa-message {
    margin-top: 1rem;
    min-height: 1.25rem;
    color: #c0392b;
}
</style>
</head>
<body>

<div class="pa-card">
    <div class="pa-title">Solve to continue</div>
    <div class="pa-sum" id="pa_sum">&nbsp;</div>
    <input class="pa-answer" id="pa_answer" type="number" inputmode="numeric" autocomplete="off"/>
    <button class="pa-button" id="pa_submit">Check</button>
    <button class="pa-button pa-speak" id="pa_speak" type="button">&#128266; Read aloud</button>
    <div class="pa-message" id="pa_message">&nbsp;</div>
</div>

<script>
/*
 * Sample puzzle page for the Puzzle Alerter Android app.
 * Copyright (c) 2026 Elod Pal Csirmaz. MIT licence; see LICENSE.
 *
 * The poll endpoint returns the URL of a page like this one. The app loads it
 * full screen in a WebView "soft lock"; when the user solves the task the page
 * calls the native bridge to dismiss the overlay:
 *
 *     window.PuzzleAlerter.solved();
 *
 * ----------------------------- Bridge contract -----------------------------
 *   object name : PuzzleAlerter   (injected via addJavascriptInterface)
 *   method      : solved()        (no arguments, no return value)
 *   effect      : collapses the overlay back to the invisible sentinel and
 *                 records THIS page's URL as last_dismissed_id, so the next poll
 *                 returning the same URL will not immediately re-show it. The
 *                 overlay re-opens only when the poll returns a genuinely new URL.
 *
 *   method      : speak(text)     (one string argument, no return value)
 *   effect      : reads text aloud through the device's native text-to-speech
 *                 engine. Use this instead of window.speechSynthesis, which the
 *                 Android WebView does NOT implement (the object exists but is
 *                 silent). Native TTS is not subject to the WebView autoplay gate,
 *                 so it works even when called automatically on load.
 *
 * Notes:
 *   - Call solved() once, only when the task is genuinely complete. Dismissal is
 *     driven solely by this call; the poll never collapses the overlay.
 *   - Validation is client-side and trusted: the user is assumed unable to forge
 *     the bridge call, so no server round-trip is needed (plan section 6.2).
 *   - Both http:// and https:// are accepted (the app enables cleartext traffic);
 *     https is still recommended. Navigation to other schemes is blocked.
 *   - Ordinary web audio works too: the app disables the WebView gesture gate
 *     (setMediaPlaybackRequiresUserGesture(false)), so new Audio(url).play() and
 *     the Web Audio API play without a preceding tap. Only speechSynthesis is
 *     unavailable -- route speech through speak() above.
 *   - This file also runs standalone in a normal browser for testing: if the
 *     bridge is absent, solved() shows a message and speak() falls back to the
 *     browser's window.speechSynthesis.
 */

var PA = {

    // The two operands of the current sum; the expected answer is their total.
    a: 0,
    b: 0,

    // Build a fresh, simple addition puzzle and show it.
    new_puzzle: function(){
        PA.a = 1 + Math.floor(Math.random() * 9);
        PA.b = 1 + Math.floor(Math.random() * 9);
        document.getElementById('pa_sum').textContent = PA.a + ' + ' + PA.b + ' = ?';
        document.getElementById('pa_answer').value = '';
        document.getElementById('pa_message').textContent = '';
        document.getElementById('pa_answer').focus();
        // Read the new puzzle aloud. Native TTS bypasses the autoplay gate, so this
        // is heard even though nothing has been tapped yet.
        PA.speak(PA.prompt_text());
    },

    // The puzzle as a spoken sentence (e.g. "What is 3 plus 5?").
    prompt_text: function(){
        return 'What is ' + PA.a + ' plus ' + PA.b + '?';
    },

    // Speak text aloud. In the app, hand it to the native bridge; standalone in a
    // browser, fall back to the Web Speech API (which the WebView lacks).
    speak: function(text){
        if(window.PuzzleAlerter && typeof window.PuzzleAlerter.speak === 'function'){
            window.PuzzleAlerter.speak(text);
            return;
        }
        if(window.speechSynthesis){
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
            return;
        }
        console.warn('No TTS available (no PuzzleAlerter bridge, no speechSynthesis).');
    },

    // Validate the typed answer; dismiss on success, prompt again on failure.
    check: function(){
        var raw = document.getElementById('pa_answer').value;
        if(!raw.match(/^-?\d+$/)){ PA.fail('Please enter a number'); return; }
        if(parseInt(raw, 10) !== PA.a + PA.b){ PA.fail('Not quite -- try again'); return; }
        PA.dismiss();
    },

    fail: function(msg){
        document.getElementById('pa_message').textContent = msg;
    },

    // Hand control back to the app. This is the one line that matters.
    dismiss: function(){
        if(window.PuzzleAlerter && typeof window.PuzzleAlerter.solved === 'function'){
            window.PuzzleAlerter.solved();
            return;
        }
        // No native bridge: we are in an ordinary browser, testing the page.
        console.warn('PuzzleAlerter bridge not present; running standalone.');
        document.getElementById('pa_message').style.color = '#2e7d32';
        document.getElementById('pa_message').textContent = 'Solved (standalone -- no app to dismiss).';
    }

};

document.getElementById('pa_submit').addEventListener('click', PA.check);
document.getElementById('pa_speak').addEventListener('click', function(){ PA.speak(PA.prompt_text()); });
document.getElementById('pa_answer').addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ PA.check(); }
});
PA.new_puzzle();
</script>

</body>
</html>
